<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 20" width="30" height="20">
  <!-- Japan flag: white background, red circle centered -->
  <rect width="30" height="20" fill="#ffffff"/>
  <circle cx="15" cy="10" r="6" fill="#bc002d"/>
  <!-- Yen sign centered in the red circle -->
  <text x="15" y="13.5" font-family="sans-serif" font-size="8" font-weight="bold"
        fill="#000000" text-anchor="middle">¥</text>
</svg>
